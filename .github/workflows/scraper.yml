name: Run News Scraper
on:
  schedule:
    - cron: '0 23 * * *'
    - cron: '0 5 * * *'
    - cron: '0 11 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r scraper/requirements.txt
      - name: Run scraper
        run: python scraper/scraper.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit and push feed.json
        run: |
          git config user.name "Misaki Zuno Bot"
          git config user.email "bot@iamshoemaker.com"
          git pull origin main
          git add feed.json
          git diff --staged --quiet || git commit -m "Auto-update: feed.json"
          git push
