name: Build posts.json

on:
  push:
    paths:
      - 'content/posts/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build posts.json
        run: python build_posts.py

      - name: Commit and push posts.json
        run: |
          git config user.name "Ren Shoku Bot"
          git config user.email "bot@iamshoemaker.com"
          git pull origin main
          git add posts.json
          git diff --staged --quiet || git commit -m "Auto-build: posts.json"
          git push
