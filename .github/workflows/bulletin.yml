name: Sunday Intelligence Report
on:
  schedule:
    - cron: '0 8 * * 0'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  bulletin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r scraper/requirements.txt
      - name: Run bulletin generator
        run: python scraper/bulletin.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit and push bulletin.json
        run: |
          git config user.name "Misaki Zuno Bot"
          git config user.email "bot@iamshoemaker.com"
          git pull origin main
          git add bulletin.json
          git diff --staged --quiet || git commit -m "Auto-update: bulletin.json [Sunday Intelligence Report]"
          git push
