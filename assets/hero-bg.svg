  <!-- 5. Subtle concentric arcs centered around shoe last (center ~1000, 320) -->
  <g opacity="0.3">
    <path d="M 700 320 A 300 300 0 0 1 1300 320" fill="none" stroke="#1A2F4E" stroke-width="0.5"/>
    <path d="M 720 320 A 280 280 0 0 1 1280 320" fill="none" stroke="#1A2F4E" stroke-width="0.5"/>
    <path d="M 740 320 A 260 260 0 0 1 1260 320" fill="none" stroke="#1A2F4E" stroke-width="0.5"/>
    <path d="M 760 320 A 240 240 0 0 1 1240 320" fill="none" stroke="#1A2F4E" stroke-width="0.5"/>
    <path d="M 780 320 A 220 220 0 0 1 1220 320" fill="none" stroke="#1A2F4E" stroke-width="0.5"/>
    <path d="M 800 320 A 200 200 0 0 1 1200 320" fill="none" stroke="#1A2F4E" stroke-width="0.5"/>
    <path d="M 820 320 A 180 180 0 0 1 1180 320" fill="none" stroke="#1A2F4E" stroke-width="0.5"/>
    <path d="M 840 320 A 160 160 0 0 1 1160 320" fill="none" stroke="#1A2F4E" stroke-width="0.5"/>
  </g>

  <!-- 2. Geometric stitch lines radiating from shoe last -->
  <g opacity="0.6" stroke="#1A2F4E" stroke-width="0.8">
    <line x1="1000" y1="160" x2="1000" y2="100"/>
    <line x1="1000" y1="160" x2="1050" y2="105"/>
    <line x1="1000" y1="160" x2="1090" y2="120"/>
    <line x1="1000" y1="160" x2="1120" y2="145"/>
    <line x1="1000" y1="160" x2="1130" y2="175"/>
    <line x1="1000" y1="160" x2="960"  y2="105"/>
    <line x1="1000" y1="160" x2="920"  y2="120"/>
    <line x1="1000" y1="160" x2="890"  y2="145"/>
    <line x1="1000" y1="160" x2="880"  y2="175"/>
    <!-- Lower stitch lines -->
    <line x1="1000" y1="420" x2="1000" y2="490"/>
    <line x1="1000" y1="420" x2="1050" y2="480"/>
    <line x1="1000" y1="420" x2="1090" y2="460"/>
    <line x1="1000" y1="420" x2="960"  y2="480"/>
    <line x1="1000" y1="420" x2="920"  y2="460"/>
  </g>

  <!-- 1. Abstract shoe last outline — architectural side profile -->
  <g fill="none" stroke="#1E3A5F" stroke-width="1.5">
    <!-- Main shoe last body — side profile -->
    <!-- Toe area left, heel area right -->
    <path d="
      M 840 370
      C 840 370 850 340 870 320
      C 890 300 920 290 960 285
      C 990 282 1020 284 1050 290
      C 1080 296 1110 308 1130 325
      C 1150 342 1155 360 1150 378
      C 1145 396 1130 408 1110 414
      C 1090 420 1060 422 1030 420
      L 880 415
      C 860 413 845 395 840 370 Z
    "/>
    <!-- Toe cap line -->
    <path d="M 840 370 C 838 355 845 340 860 332"/>
    <!-- Waist line -->
    <path d="M 940 286 C 940 260 960 245 985 242 C 1010 239 1030 248 1035 268"/>
    <!-- Heel counter -->
    <path d="M 1130 325 C 1145 310 1155 295 1150 278 C 1145 261 1130 255 1115 258"/>
    <!-- Insole line -->
    <path d="M 845 412 C 900 425 980 430 1060 428 C 1100 427 1130 422 1148 415" stroke-dasharray="4 3"/>
    <!-- Featherline -->
    <path d="M 850 378 C 920 368 1010 365 1100 372" opacity="0.5"/>
  </g>

  <!-- 4. Gold accent diamonds at key intersection points -->
  <g fill="#C9A84C" opacity="0.6">
    <!-- Diamond = rotated square -->
    <rect x="994" y="154" width="12" height="12" transform="rotate(45 1000 160)"/>
    <rect x="1124" y="174" width="8"  height="8"  transform="rotate(45 1128 178)"/>
    <rect x="868"  y="174" width="8"  height="8"  transform="rotate(45 872 178)"/>
    <rect x="994" y="414" width="12" height="12" transform="rotate(45 1000 420)"/>
    <rect x="836"  y="364" width="8"  height="8"  transform="rotate(45 840 368)"/>
  </g>

</svg>
