    <line x1="80"   y1="0" x2="80"   y2="600" stroke="#112240" stroke-width="0.5"/>
    <line x1="120"  y1="0" x2="120"  y2="600" stroke="#112240" stroke-width="0.5"/>
    <line x1="160"  y1="0" x2="160"  y2="600" stroke="#112240" stroke-width="0.5"/>
